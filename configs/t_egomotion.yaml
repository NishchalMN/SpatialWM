name: t_egomotion
seed: 0
device: auto
data:
  cache_dir: data/cache/latents
  manifest: data/manifests/tartanair_slice.parquet
  context_len: 8
  deltas: [1, 4, 8, 16]
backbone:
  name: dinov2_vits14
  frozen: true
predictor:
  type: latent
  conditioning: token
  dim: 384
  depth: 4
  heads: 6
train:
  epochs: 30
  batch_size: 32
  lr: 3.0e-4
  grad_accum: 1
  amp: true
  ckpt_dir: results/ckpts/t_egomotion
